name: ${COMPOSE_PROJECT_NAME:-dealpilot-phase1}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dealpilot}
      POSTGRES_USER: ${POSTGRES_USER:-dealpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/phase1/.env}
    expose:
      - '5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data-plane
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  migrate:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: 'no'
    init: true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dealpilot}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/phase1/.env}@postgres:5432/${POSTGRES_DB:-dealpilot}
      TZ: Africa/Cairo
    command:
      - node
      - -e
      - >-
        const source = require('./apps/api/dist/database/data-source.js').default;
        (async () => {
          await source.initialize();
          try { await source.runMigrations({ transaction: 'all' }); }
          finally { await source.destroy(); }
        })().catch(() => process.exit(1));
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-plane

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: '3000'
      DATABASE_ENABLED: 'true'
      DATABASE_URL: postgresql://${POSTGRES_USER:-dealpilot}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/phase1/.env}@postgres:5432/${POSTGRES_DB:-dealpilot}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in infra/phase1/.env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:?Set INTERNAL_TOKEN in infra/phase1/.env}
      VIEWER_TOKEN_SECRET: ${VIEWER_TOKEN_SECRET:?Set VIEWER_TOKEN_SECRET in infra/phase1/.env}
      VIEWER_TOKEN_TTL_SECONDS: ${VIEWER_TOKEN_TTL_SECONDS:-900}
      ADDRESS_SECRET_TTL_MS: ${ADDRESS_SECRET_TTL_MS:-1800000}
      CONTROL_LEASE_TTL_SECONDS: ${CONTROL_LEASE_TTL_SECONDS:-120}
      RUN_BROWSER_TTL_SECONDS: ${RUN_BROWSER_TTL_SECONDS:-3600}
      EVENT_RETENTION_SECONDS: ${EVENT_RETENTION_SECONDS:-86400}
      DEALPILOT_PUBLIC_ORIGIN: ${DEALPILOT_PUBLIC_ORIGIN:-http://localhost:8080}
      TZ: Africa/Cairo
    expose:
      - '3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - control-plane
      - data-plane
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const { Client } = require('pg');
          (async () => {
            const response = await fetch('http://127.0.0.1:3000/health/ready');
            if (!response.ok) throw new Error('api-not-ready');
            const client = new Client({ connectionString: process.env.DATABASE_URL });
            await client.connect();
            try {
              const result = await client.query("SELECT to_regclass('public.shopping_runs')::text AS runs, to_regclass('public.shopping_run_events')::text AS events");
              if (result.rows[0]?.runs !== 'shopping_runs' || result.rows[0]?.events !== 'shopping_run_events') throw new Error('schema-not-ready');
            } finally { await client.end(); }
          })().catch(() => process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  ai-service:
    build:
      context: ../../services/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    command:
      - /bin/sh
      - -eu
      - -c
      - >-
        export AI_OPENROUTER_API_KEY="$$(cat /run/secrets/ai_openrouter_api_key)";
        exec uvicorn agent_ai.main:app --host 0.0.0.0 --port 8000
    environment:
      AI_ENVIRONMENT: ${AI_ENVIRONMENT:-production}
      AI_HOST: 0.0.0.0
      AI_PORT: '8000'
      AI_LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
      AI_MODEL: ${AI_MODEL:-openai/gpt-5.2}
      AI_VISION_FALLBACK_PROVIDER: ${AI_VISION_FALLBACK_PROVIDER:-openrouter}
      AI_VISION_FALLBACK_MODEL: ${AI_VISION_FALLBACK_MODEL:-}
      AI_GEMINI_API_KEY: ${AI_GEMINI_API_KEY:-}
      AI_GEMINI_VISION_MODEL: ${AI_GEMINI_VISION_MODEL:-gemini-3-flash-preview}
      AI_SELENIUM_REMOTE_URL: ${AI_SELENIUM_REMOTE_URL:-http://browser:4444/wd/hub}
      AI_CONTROL_API_URL: ${AI_CONTROL_API_URL:-http://api:3000}
      AI_INTERNAL_TOKEN: ${INTERNAL_TOKEN:?Set INTERNAL_TOKEN in infra/phase1/.env}
      AI_MAX_COMPUTER_STEPS: ${AI_MAX_COMPUTER_STEPS:-80}
      AI_MAX_VISUAL_RETRIES: ${AI_MAX_VISUAL_RETRIES:-3}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-30}
      AI_REAP_ORPHANED_BROWSER_SESSIONS: 'true'
      RUN_BROWSER_TTL_SECONDS: ${RUN_BROWSER_TTL_SECONDS:-3600}
      TZ: Africa/Cairo
    secrets:
      - ai_openrouter_api_key
    expose:
      - '8000'
    depends_on:
      api:
        condition: service_healthy
      browser:
        condition: service_healthy
    networks:
      - control-plane
      - agent-egress
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |-
          import json, pathlib, urllib.request;
          assert pathlib.Path('/run/secrets/ai_openrouter_api_key').stat().st_size > 0;
          assert json.load(urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3))['status'] == 'ok';
          value = json.load(urllib.request.urlopen('http://browser:4444/status', timeout=3))['value'];
          assert any(node.get('availability') == 'UP' for node in value.get('nodes', []));
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 20s

  browser:
    image: ${SELENIUM_IMAGE:-selenium/standalone-chromium:4.45.0-20260606}
    restart: unless-stopped
    shm_size: 2gb
    environment:
      SE_NODE_MAX_SESSIONS: ${SE_NODE_MAX_SESSIONS:-1}
      SE_NODE_OVERRIDE_MAX_SESSIONS: 'false'
      SE_NODE_SESSION_TIMEOUT: ${SE_NODE_SESSION_TIMEOUT:-3600}
      SE_SESSION_REQUEST_TIMEOUT: ${SE_SESSION_REQUEST_TIMEOUT:-30}
      SE_SCREEN_WIDTH: '1280'
      SE_SCREEN_HEIGHT: '800'
      SE_SCREEN_DEPTH: '24'
      SE_START_XVFB: 'true'
      SE_START_VNC: 'true'
      SE_VNC_NO_PASSWORD: 'true'
      SE_MASK_SECRETS: 'true'
      SE_BROWSER_ARGS_WINDOW_SIZE: --window-size=1280,800
      SE_BROWSER_ARGS_DISABLE_EXTENSIONS: --disable-extensions
      SE_BROWSER_ARGS_DISABLE_COMPONENT_EXTENSIONS: --disable-component-extensions-with-background-pages
      SE_BROWSER_ARGS_NO_FIRST_RUN: --no-first-run
      SE_BROWSER_ARGS_NO_DEFAULT_BROWSER_CHECK: --no-default-browser-check
      TZ: Africa/Cairo
    expose:
      - '4444'
      - '7900'
    networks:
      - control-plane
      - agent-egress
    healthcheck:
      # Selenium's own `ready` flag becomes false while its single slot is in
      # use. The service is still healthy (and its VNC stream is live), so the
      # container check must test the status endpoint rather than slot capacity.
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:4444/status']
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  gateway:
    image: ${CADDY_IMAGE:-caddy:2.11.4-alpine}
    profiles:
      - local-only
      - cloud-tunnel
    restart: unless-stopped
    init: true
    environment:
      CADDY_API_UPSTREAM: ${CADDY_API_UPSTREAM:-api:3000}
      CADDY_VIEWER_UPSTREAM: ${CADDY_VIEWER_UPSTREAM:-browser:7900}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:?Set INTERNAL_TOKEN in infra/phase1/.env}
      TZ: Africa/Cairo
    ports:
      - '${DEALPILOT_GATEWAY_BIND:-127.0.0.1}:${DEALPILOT_GATEWAY_PORT:-8080}:8080'
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
    tmpfs:
      - /config
      - /data
    depends_on:
      api:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      browser:
        condition: service_healthy
    networks:
      - edge-plane
      - control-plane
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-q',
          '--spider',
          'http://127.0.0.1:8080/_gateway/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.7.2}
    profiles:
      - cloud-tunnel
    restart: unless-stopped
    init: true
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - ${CLOUDFLARED_LOG_LEVEL:-info}
      - --metrics
      - 0.0.0.0:2000
      - run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    expose:
      - '2000'
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - edge-plane

volumes:
  postgres-data:

secrets:
  ai_openrouter_api_key:
    environment: AI_OPENROUTER_API_KEY

networks:
  edge-plane:
    driver: bridge
  control-plane:
    driver: bridge
    internal: true
  data-plane:
    driver: bridge
    internal: true
  agent-egress:
    driver: bridge
