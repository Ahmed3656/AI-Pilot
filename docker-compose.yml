services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_ENABLED: "true"
      DATABASE_URL: postgresql://agent:agent@postgres:5432/agent_platform
      JWT_SECRET: local-docker-secret-change-before-production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  ai-service:
    build:
      context: services/ai-service
    environment:
      AI_ENVIRONMENT: development
      AI_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  postgres-data:
